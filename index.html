<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="高反差传播向 AI 海报图集，按主题和 category 持续追加。">
    <meta property="og:title" content="Prompt Collision Gallery">
    <meta property="og:description" content="创意组合与对比反差的 AI 海报图集。">
    <meta property="og:image" content="assets/contact_sheet_image2.jpg">
    <title>Prompt Collision Gallery</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #66645e;
        --line: #dfddd6;
        --paper: #f7f3ea;
        --panel: #fffdf7;
        --red: #a93526;
        --blue: #1f5c70;
        --green: #52633b;
        --shadow: 0 18px 50px rgb(31 28 23 / 14%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgb(247 243 234 / 88%);
        backdrop-filter: blur(18px);
      }

      .topbar .shell {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
        min-width: 0;
      }

      .brand strong {
        font-size: 18px;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .tab {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
      }

      .tab[aria-pressed="true"] {
        border-color: var(--ink);
        background: var(--ink);
        color: white;
      }

      .intro {
        padding: 34px 0 24px;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
        gap: 28px;
        align-items: end;
      }

      h1 {
        margin: 0;
        max-width: 760px;
        font-size: clamp(36px, 6vw, 76px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .intro-copy {
        color: var(--muted);
        font-size: 16px;
        margin: 0;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .stat {
        border-top: 3px solid var(--ink);
        padding-top: 10px;
      }

      .stat:nth-child(2) {
        border-color: var(--red);
      }

      .stat:nth-child(3) {
        border-color: var(--blue);
      }

      .stat b {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .stat span {
        color: var(--muted);
        font-size: 13px;
      }

      .featured {
        margin: 0 0 28px;
        border: 1px solid var(--line);
        background: var(--panel);
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        overflow: hidden;
      }

      .featured img {
        width: 100%;
        height: 100%;
        min-height: 320px;
        object-fit: cover;
        display: block;
      }

      .featured-text {
        padding: 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 24px;
      }

      .eyebrow {
        color: var(--red);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .featured h2 {
        margin: 10px 0 12px;
        font-size: 28px;
        line-height: 1.12;
        letter-spacing: 0;
      }

      .featured p,
      .card p {
        margin: 0;
        color: var(--muted);
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        padding-bottom: 44px;
      }

      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 8px 28px rgb(31 28 23 / 7%);
      }

      .thumb-button {
        border: 0;
        padding: 0;
        display: block;
        width: 100%;
        background: #ddd8cc;
        cursor: zoom-in;
      }

      .thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        object-fit: cover;
      }

      .card-body {
        padding: 14px 14px 16px;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .tag {
        color: white;
        background: var(--green);
        border-radius: 999px;
        padding: 3px 9px;
        white-space: nowrap;
      }

      .tag.contrast {
        background: var(--red);
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.18;
        letter-spacing: 0;
      }

      .card p {
        font-size: 13px;
      }

      .card-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .link-button {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 10px;
        text-decoration: none;
        font-size: 13px;
        background: #fbf8f0;
      }

      .dialog {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background: rgb(16 15 13 / 82%);
      }

      .dialog.open {
        display: flex;
      }

      .dialog-panel {
        width: min(1280px, 100%);
        max-height: calc(100vh - 44px);
        background: #11100e;
        color: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .dialog-header {
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px 14px;
      }

      .dialog-title {
        margin: 0;
        font-size: 16px;
      }

      .close {
        border: 1px solid rgb(255 255 255 / 22%);
        background: rgb(255 255 255 / 8%);
        color: white;
        border-radius: 6px;
        min-width: 38px;
        min-height: 34px;
        font: inherit;
        cursor: pointer;
      }

      .dialog img {
        width: 100%;
        max-height: calc(100vh - 118px);
        object-fit: contain;
        display: block;
        background: #050505;
      }

      footer {
        border-top: 1px solid var(--line);
        padding: 22px 0 34px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 920px) {
        .topbar {
          position: static;
        }

        .topbar .shell,
        .intro,
        .featured {
          grid-template-columns: 1fr;
        }

        .topbar .shell {
          align-items: flex-start;
          padding: 14px 0;
        }

        .gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .featured-text {
          padding: 22px;
        }
      }

      @media (max-width: 620px) {
        .shell {
          width: min(100% - 22px, 1180px);
        }

        .brand {
          flex-direction: column;
          gap: 2px;
        }

        .tabs {
          width: 100%;
          justify-content: flex-start;
        }

        .tab {
          flex: 1 1 auto;
          padding-inline: 10px;
        }

        .intro {
          padding-top: 24px;
        }

        .stats,
        .gallery {
          grid-template-columns: 1fr;
        }

        .featured img {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="shell">
        <div class="brand">
          <strong>Prompt Collision Gallery</strong>
          <span id="site-subtitle">传播向 AI 海报</span>
        </div>
        <nav class="tabs" id="tabs" aria-label="图集筛选"></nav>
      </div>
    </header>

    <main class="shell">
      <section class="intro" aria-labelledby="page-title">
        <div>
          <h1 id="page-title">创意组合和对比反差的视觉实验</h1>
        </div>
        <div>
          <p class="intro-copy" id="intro-copy">把品牌、文化、场景和时代错位放进同一张画面，追求第一眼能停住、第二眼能转发的海报感。</p>
          <div class="stats" aria-label="图集统计">
            <div class="stat"><b id="total-count">0</b><span>张图片</span></div>
            <div class="stat"><b id="category-count">0</b><span>个 category</span></div>
            <div class="stat"><b id="batch-count">0</b><span>个主题批次</span></div>
          </div>
        </div>
      </section>

      <section class="featured" aria-label="主视觉">
        <img id="cover-image" src="assets/contact_sheet_image2.jpg" alt="AI 海报总览拼图">
        <div class="featured-text">
          <div>
            <div class="eyebrow" id="cover-eyebrow">Image2 Collection</div>
            <h2 id="cover-title">高冲突画面，比单点创意更容易被记住。</h2>
            <p id="cover-copy">图集保留完整生成提示词，适合继续做封面、营销海报、选题测试或二次精修。</p>
          </div>
          <a class="link-button" href="assets/gallery.json">查看图集 JSON</a>
        </div>
      </section>

      <section class="gallery" id="gallery" aria-label="图片列表"></section>
    </main>

    <footer>
      <div class="shell">Generated with image2. Published as a static GitHub Pages gallery.</div>
    </footer>

    <div class="dialog" id="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <div class="dialog-panel">
        <div class="dialog-header">
          <h2 class="dialog-title" id="dialog-title"></h2>
          <button class="close" type="button" aria-label="关闭预览">×</button>
        </div>
        <img id="dialog-image" alt="">
      </div>
    </div>

    <script>
      const gallery = document.querySelector("#gallery");
      const tabs = document.querySelector("#tabs");
      const dialog = document.querySelector("#dialog");
      const dialogTitle = document.querySelector("#dialog-title");
      const dialogImage = document.querySelector("#dialog-image");
      const closeButton = document.querySelector(".close");
      let items = [];
      let categoryLabels = new Map();

      function labelFor(type) {
        return categoryLabels.get(type) || type;
      }

      function renderTabs(categories) {
        tabs.innerHTML = "";
        const all = document.createElement("button");
        all.className = "tab";
        all.type = "button";
        all.dataset.filter = "all";
        all.setAttribute("aria-pressed", "true");
        all.textContent = "全部";
        tabs.appendChild(all);

        categories.forEach((category) => {
          const tab = document.createElement("button");
          tab.className = "tab";
          tab.type = "button";
          tab.dataset.filter = category.id;
          tab.setAttribute("aria-pressed", "false");
          tab.textContent = category.label;
          tabs.appendChild(tab);
        });

        tabs.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            tabs.querySelectorAll(".tab").forEach((item) => item.setAttribute("aria-pressed", "false"));
            tab.setAttribute("aria-pressed", "true");
            render(tab.dataset.filter);
          });
        });
      }

      function render(filter = "all") {
        gallery.innerHTML = "";
        items
          .filter((item) => filter === "all" || item.category === filter)
          .forEach((item) => {
            const card = document.createElement("article");
            card.className = "card";
            card.innerHTML = `
              <button class="thumb-button" type="button" aria-label="放大预览 ${item.title}">
                <img class="thumb" src="${item.image}" alt="${item.title}" loading="lazy">
              </button>
              <div class="card-body">
                <div class="meta"><span>${item.number}</span><span class="tag ${item.category}">${labelFor(item.category)}</span></div>
                <h3>${item.title}</h3>
                <p>${item.description || ""}</p>
                <div class="card-actions">
                  <a class="link-button" href="${item.image}">打开原图</a>
                </div>
              </div>
            `;
            card.querySelector(".thumb-button").addEventListener("click", () => {
              dialogTitle.textContent = item.title;
              dialogImage.src = item.image;
              dialogImage.alt = item.title;
              dialog.classList.add("open");
              closeButton.focus();
            });
            gallery.appendChild(card);
          });
      }

      function closeDialog() {
        dialog.classList.remove("open");
        dialogImage.removeAttribute("src");
      }

      closeButton.addEventListener("click", closeDialog);
      dialog.addEventListener("click", (event) => {
        if (event.target === dialog) closeDialog();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDialog();
      });

      async function init() {
        const response = await fetch("assets/gallery.json");
        const data = await response.json();
        items = data.items || [];
        categoryLabels = new Map((data.categories || []).map((category) => [category.id, category.label]));

        document.querySelector(".brand strong").textContent = data.site?.title || "Prompt Collision Gallery";
        document.querySelector("#site-subtitle").textContent = data.site?.subtitle || `${items.length} 张传播向 AI 海报`;
        document.querySelector("#page-title").textContent = data.site?.headline || "视觉实验";
        document.querySelector("#intro-copy").textContent = data.site?.intro || "";
        document.querySelector("#total-count").textContent = items.length;
        document.querySelector("#category-count").textContent = data.categories?.length || 0;
        document.querySelector("#batch-count").textContent = data.batches?.length || 0;
        document.querySelector("#cover-image").src = data.site?.coverImage || "assets/contact_sheet_image2.jpg";
        document.querySelector("#cover-image").alt = data.site?.coverAlt || "AI 海报总览拼图";
        document.querySelector("#cover-eyebrow").textContent = data.site?.coverEyebrow || "Image2 Collection";
        document.querySelector("#cover-title").textContent = data.site?.coverTitle || "";
        document.querySelector("#cover-copy").textContent = data.site?.coverCopy || "";

        renderTabs(data.categories || []);
        render();
      }

      init().catch((error) => {
        gallery.innerHTML = `<p>图集数据加载失败：${error.message}</p>`;
      });
    </script>
  </body>
</html>

    <g transform="translate(1030 765)">
      <circle cx="0" cy="0" r="18" fill="#ca8a04"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">3</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">代表思路：Switch Transformer</text>
<text x="34" y="23" font-size="24" fill="#334155" font-weight="650"> 简化为 top-1 路由</text>
    </g>

  <text x="1074" y="254" font-size="30" fill="#0f172a" font-weight="800">Expert 1..N</text>
  <text x="1074" y="294" font-size="21" fill="#475569" font-weight="500">多个 FFN 专家各自学习不同模式</text>
  

  <rect x="90" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="412" width="10" height="132" rx="5" fill="#ca8a04"/>

  <text x="118" y="496" font-size="21" fill="#475569" font-weight="500">只激活少数专家，降低 FLOPs</text>
  

  <rect x="568" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="412" width="10" height="132" rx="5" fill="#ca8a04"/>
  <text x="596" y="456" font-size="30" fill="#0f172a" font-weight="800">Combine</text>
  <text x="596" y="496" font-size="21" fill="#475569" font-weight="500">按路由权重合并专家输出</text>
  

  <rect x="1046" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="412" width="10" height="132" rx="5" fill="#ca8a04"/>
  <text x="1074" y="456" font-size="30" fill="#0f172a" font-weight="800">Next Layer</text>
  <text x="1074" y="496" font-size="21" fill="#475569" font-weight="500">回到主干 Transformer 继续传播</text>
  
  <rect x="86" y="700" width="1428" height="190" rx="24" fill="#f8fafc" stroke="#dbe4f0" stroke-width="2"/>
  
    <g transform="translate(170 765)">
      <circle cx="0" cy="0" r="18" fill="#ca8a04"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">1</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">优点：参数容量大，单次计算相对省</text>
    </g>

    <g transform="translate(600 765)">
      <circle cx="0" cy="0" r="18" fill="#ca8a04"/>

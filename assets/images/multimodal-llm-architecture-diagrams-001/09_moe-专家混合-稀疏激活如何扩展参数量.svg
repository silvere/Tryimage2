  <rect width="1600" height="1000" fill="#fefce8"/>
  <rect x="42" y="42" width="1516" height="916" rx="36" fill="#ffffff" opacity="0.72" filter="url(#shadow)"/>
  <text x="86" y="112" font-size="34" fill="#ca8a04" font-weight="900">多模态大模型运作原理</text>
  <text x="86" y="166" font-size="46" fill="#0f172a" font-weight="900">MoE 专家混合：稀疏激活如何扩展参数量</text>
  <text x="86" y="910" font-size="24" fill="#64748b" font-weight="600">路由器为每个 token 选择少量专家，计算成本近似固定，但总参数容量大幅增加。</text>
  <path d="M 488 276 C 543 276, 505 276, 560 276" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 276 C 1021 276, 983 276, 1038 276" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1241 350 C 1296 350, 230 404, 285 404" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 488 478 C 543 478, 505 478, 560 478" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 478 C 1021 478, 983 478, 1038 478" fill="none" stroke="#ca8a04" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <rect x="90" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="210" width="10" height="132" rx="5" fill="#ca8a04"/>
  <text x="118" y="254" font-size="30" fill="#0f172a" font-weight="800">Token Hidden State</text>
  <text x="118" y="294" font-size="21" fill="#475569" font-weight="500">每个 token 进入 Transforme</text>
<text x="118" y="322" font-size="21" fill="#475569" font-weight="500">r 层</text>
  

  <rect x="568" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="210" width="10" height="132" rx="5" fill="#ca8a04"/>
  <text x="596" y="254" font-size="30" fill="#0f172a" font-weight="800">Router</text>
  <text x="596" y="294" font-size="21" fill="#475569" font-weight="500">计算 token 应该发送给哪些专家</text>
  

  <rect x="1046" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>

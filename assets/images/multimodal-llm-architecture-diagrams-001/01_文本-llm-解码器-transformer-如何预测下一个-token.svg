  </defs>
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <rect x="42" y="42" width="1516" height="916" rx="36" fill="#ffffff" opacity="0.72" filter="url(#shadow)"/>
  <text x="86" y="112" font-size="34" fill="#2563eb" font-weight="900">多模态大模型运作原理</text>
  <text x="86" y="166" font-size="46" fill="#0f172a" font-weight="900">文本 LLM：解码器 Transformer 如何预测下一个 token</text>
  <text x="86" y="910" font-size="24" fill="#64748b" font-weight="600">从文本切分、嵌入、自注意力、MLP 到 KV Cache 与采样输出的完整推理路径。</text>
  <path d="M 488 276 C 543 276, 505 276, 560 276" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 276 C 1021 276, 983 276, 1038 276" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1241 350 C 1296 350, 230 404, 285 404" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 488 478 C 543 478, 505 478, 560 478" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 478 C 1021 478, 983 478, 1038 478" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <rect x="90" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="210" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="118" y="254" font-size="30" fill="#0f172a" font-weight="800">输入文本</text>
  <text x="118" y="294" font-size="21" fill="#475569" font-weight="500">分词器把自然语言切成 token，并加入位置</text>
<text x="118" y="322" font-size="21" fill="#475569" font-weight="500">编码</text>
  

  <rect x="568" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="210" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="596" y="254" font-size="30" fill="#0f172a" font-weight="800">Embedding</text>
  <text x="596" y="294" font-size="21" fill="#475569" font-weight="500">token id 映射为向量，形成上下文序列</text>
  

  <rect x="1046" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="210" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="1074" y="254" font-size="30" fill="#0f172a" font-weight="800">Decoder Block x N</text>
  <text x="1074" y="294" font-size="21" fill="#475569" font-weight="500">Masked Self-Attention </text>
<text x="1074" y="322" font-size="21" fill="#475569" font-weight="500">只能看见历史 token</text>
  

  <rect x="90" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="412" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="118" y="456" font-size="30" fill="#0f172a" font-weight="800">FFN / MLP</text>
  <text x="118" y="496" font-size="21" fill="#475569" font-weight="500">逐 token 非线性变换，残差与归一化稳定</text>
<text x="118" y="524" font-size="21" fill="#475569" font-weight="500">训练</text>
  

  <rect x="568" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="412" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="596" y="456" font-size="30" fill="#0f172a" font-weight="800">Logits</text>
  <text x="596" y="496" font-size="21" fill="#475569" font-weight="500">线性头输出词表概率分布</text>
  

  <rect x="1046" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="412" width="10" height="132" rx="5" fill="#2563eb"/>
  <text x="1074" y="456" font-size="30" fill="#0f172a" font-weight="800">Sampling</text>
  <text x="1074" y="496" font-size="21" fill="#475569" font-weight="500">temperature / top-p 选择</text>
<text x="1074" y="524" font-size="21" fill="#475569" font-weight="500">下一个 token</text>
  
  <rect x="86" y="700" width="1428" height="190" rx="24" fill="#f8fafc" stroke="#dbe4f0" stroke-width="2"/>
  
    <g transform="translate(170 765)">
      <circle cx="0" cy="0" r="18" fill="#2563eb"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">1</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">训练：预测被右移的下一个 token</text>
    </g>

    <g transform="translate(600 765)">
      <circle cx="0" cy="0" r="18" fill="#2563eb"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">2</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">推理：逐步生成并复用 KV Cache</text>
    </g>

    <g transform="translate(1030 765)">
      <circle cx="0" cy="0" r="18" fill="#2563eb"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">3</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">核心：注意力把上下文变成动态路由</text>
    </g>

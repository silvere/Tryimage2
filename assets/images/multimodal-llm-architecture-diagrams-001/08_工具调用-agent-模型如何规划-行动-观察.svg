  <text x="118" y="294" font-size="21" fill="#475569" font-weight="500">用户给出目标、约束和上下文</text>
  

  <rect x="568" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="210" width="10" height="132" rx="5" fill="#4f46e5"/>

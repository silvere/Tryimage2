<path d="M 488 478 C 543 478, 505 478, 560 478" fill="none" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 478 C 1021 478, 983 478, 1038 478" fill="none" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <rect x="90" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>

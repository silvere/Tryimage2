  <text x="1074" y="456" font-size="30" fill="#0f172a" font-weight="800">Final Response</text>
  <text x="1074" y="496" font-size="21" fill="#475569" font-weight="500">整合证据、操作记录和结论</text>
  
  <rect x="86" y="700" width="1428" height="190" rx="24" fill="#f8fafc" stroke="#dbe4f0" stroke-width="2"/>
  
    <g transform="translate(170 765)">

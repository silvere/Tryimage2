  <text x="596" y="294" font-size="21" fill="#475569" font-weight="500">拆分步骤，决定是否调用工具</text>
  

  <rect x="1046" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>

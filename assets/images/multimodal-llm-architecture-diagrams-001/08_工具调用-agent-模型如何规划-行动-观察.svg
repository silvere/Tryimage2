  <text x="118" y="496" font-size="21" fill="#475569" font-weight="500">外部系统执行动作并返回观察</text>
  

  <rect x="568" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="412" width="10" height="132" rx="5" fill="#4f46e5"/>

  <text x="1074" y="294" font-size="21" fill="#475569" font-weight="500">选择搜索、代码、数据库、浏览器或 API</text>
  

  <rect x="90" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>

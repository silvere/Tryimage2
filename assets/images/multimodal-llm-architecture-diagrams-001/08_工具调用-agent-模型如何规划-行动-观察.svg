  <rect width="1600" height="1000" fill="#eef2ff"/>
  <rect x="42" y="42" width="1516" height="916" rx="36" fill="#ffffff" opacity="0.72" filter="url(#shadow)"/>
  <text x="86" y="112" font-size="34" fill="#4f46e5" font-weight="900">多模态大模型运作原理</text>
  <text x="86" y="166" font-size="46" fill="#0f172a" font-weight="900">工具调用 Agent：模型如何规划、行动、观察</text>
  <text x="86" y="910" font-size="24" fill="#64748b" font-weight="600">LLM 不只生成文本，而是在循环中选择工具、传参、读取结果并更新下一步计划。</text>
  <path d="M 488 276 C 543 276, 505 276, 560 276" fill="none" stroke="#4f46e5" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6" orient="auto">
      <path d="M2,2 L11,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="#faf5ff"/>
  <rect x="42" y="42" width="1516" height="916" rx="36" fill="#ffffff" opacity="0.72" filter="url(#shadow)"/>
  <text x="86" y="112" font-size="34" fill="#7c3aed" font-weight="900">多模态大模型运作原理</text>
  <text x="86" y="166" font-size="46" fill="#0f172a" font-weight="900">文本到图像扩散模型：从噪声到图像</text>
  <text x="86" y="910" font-size="24" fill="#64748b" font-weight="600">文本条件进入去噪网络，在潜空间多步反推，最后由解码器还原为像素图。</text>
  <path d="M 488 276 C 543 276, 505 276, 560 276" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 276 C 1021 276, 983 276, 1038 276" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1241 350 C 1296 350, 230 404, 285 404" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 488 478 C 543 478, 505 478, 560 478" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 478 C 1021 478, 983 478, 1038 478" fill="none" stroke="#7c3aed" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <rect x="90" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="210" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="118" y="254" font-size="30" fill="#0f172a" font-weight="800">文本 Prompt</text>
  <text x="118" y="294" font-size="21" fill="#475569" font-weight="500">文本编码器生成条件向量</text>
  

  <rect x="568" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="210" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="596" y="254" font-size="30" fill="#0f172a" font-weight="800">随机噪声</text>
  <text x="596" y="294" font-size="21" fill="#475569" font-weight="500">从高斯噪声或 latent noise 开始</text>
  

  <rect x="1046" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="210" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="1074" y="254" font-size="30" fill="#0f172a" font-weight="800">Denoiser</text>
  <text x="1074" y="294" font-size="21" fill="#475569" font-weight="500">U-Net 或 DiT 预测噪声残差</text>
  

  <rect x="90" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="412" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="118" y="456" font-size="30" fill="#0f172a" font-weight="800">Cross-Attention</text>
  <text x="118" y="496" font-size="21" fill="#475569" font-weight="500">每一步根据文本条件约束内容与风格</text>
  

  <rect x="568" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="412" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="596" y="456" font-size="30" fill="#0f172a" font-weight="800">Scheduler</text>
  <text x="596" y="496" font-size="21" fill="#475569" font-weight="500">按时间步逐渐降低噪声</text>
  

  <rect x="1046" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="412" width="10" height="132" rx="5" fill="#7c3aed"/>
  <text x="1074" y="456" font-size="30" fill="#0f172a" font-weight="800">VAE Decoder</text>
  <text x="1074" y="496" font-size="21" fill="#475569" font-weight="500">潜变量解码成最终图像</text>
  
  <rect x="86" y="700" width="1428" height="190" rx="24" fill="#f8fafc" stroke="#dbe4f0" stroke-width="2"/>
  
    <g transform="translate(170 765)">
      <circle cx="0" cy="0" r="18" fill="#7c3aed"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">1</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">训练：学习不同噪声强度下的去噪</text>
    </g>

    <g transform="translate(600 765)">
      <circle cx="0" cy="0" r="18" fill="#7c3aed"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">2</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">采样：多步迭代换质量，少步迭代换速度</text>
    </g>

    <g transform="translate(1030 765)">
      <circle cx="0" cy="0" r="18" fill="#7c3aed"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">3</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">新趋势：Diffusion Transform</text>
<text x="34" y="23" font-size="24" fill="#334155" font-weight="650">er 替代 U-Net 主干</text>
    </g>
</svg>
  <text x="118" y="496" font-size="21" fill="#475569" font-weight="500">与文本 token 拼接或通过 cross-</text>
<text x="118" y="524" font-size="21" fill="#475569" font-weight="500">attention 融合</text>
  

  <rect x="568" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="412" width="10" height="132" rx="5" fill="#0f766e"/>
  <text x="596" y="456" font-size="30" fill="#0f172a" font-weight="800">LLM Reasoning</text>
  <text x="596" y="496" font-size="21" fill="#475569" font-weight="500">基于图像证据进行描述、问答、推理</text>
  

  <rect x="1046" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="412" width="10" height="132" rx="5" fill="#0f766e"/>
  <text x="1074" y="456" font-size="30" fill="#0f172a" font-weight="800">文本回答</text>
  <text x="1074" y="496" font-size="21" fill="#475569" font-weight="500">输出 caption、定位解释或多轮对话</text>
  
  <rect x="86" y="700" width="1428" height="190" rx="24" fill="#f8fafc" stroke="#dbe4f0" stroke-width="2"/>
  
    <g transform="translate(170 765)">

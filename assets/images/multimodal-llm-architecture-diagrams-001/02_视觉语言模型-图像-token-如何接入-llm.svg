      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">关键训练：视觉-语言对齐 + 指令微调</text>
    </g>

    <g transform="translate(1030 765)">
      <circle cx="0" cy="0" r="18" fill="#0f766e"/>
      <text x="-6" y="8" font-size="22" fill="#fff" font-weight="800">3</text>
      <text x="34" y="-8" font-size="24" fill="#334155" font-weight="650">风险：幻觉来自视觉证据不足或对齐偏差</text>

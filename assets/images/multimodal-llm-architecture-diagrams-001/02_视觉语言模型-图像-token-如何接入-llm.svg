  <text x="86" y="112" font-size="34" fill="#0f766e" font-weight="900">多模态大模型运作原理</text>
  <text x="86" y="166" font-size="46" fill="#0f172a" font-weight="900">视觉语言模型：图像 token 如何接入 LLM</text>
  <text x="86" y="910" font-size="24" fill="#64748b" font-weight="600">用图像编码器提取视觉特征，再经投影器对齐到语言模型可消费的 token 空间。</text>

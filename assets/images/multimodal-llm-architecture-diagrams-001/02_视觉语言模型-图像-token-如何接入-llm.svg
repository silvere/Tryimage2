<path d="M 966 276 C 1021 276, 983 276, 1038 276" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1241 350 C 1296 350, 230 404, 285 404" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 488 478 C 543 478, 505 478, 560 478" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 966 478 C 1021 478, 983 478, 1038 478" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  
  <rect x="90" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="90" y="210" width="10" height="132" rx="5" fill="#0f766e"/>
  <text x="118" y="254" font-size="30" fill="#0f172a" font-weight="800">图像输入</text>
  <text x="118" y="294" font-size="21" fill="#475569" font-weight="500">图片被切成 patch 或送入视觉编码器</text>
  

  <rect x="568" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="568" y="210" width="10" height="132" rx="5" fill="#0f766e"/>
  <text x="596" y="254" font-size="30" fill="#0f172a" font-weight="800">Vision Encoder</text>
  <text x="596" y="294" font-size="21" fill="#475569" font-weight="500">ViT/CLIP 提取局部与全局视觉特征</text>
  

  <rect x="1046" y="210" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <rect x="1046" y="210" width="10" height="132" rx="5" fill="#0f766e"/>
  <text x="1074" y="254" font-size="30" fill="#0f172a" font-weight="800">Projector</text>
  <text x="1074" y="294" font-size="21" fill="#475569" font-weight="500">线性层或 MLP 把视觉向量对齐到 LLM </text>
<text x="1074" y="322" font-size="21" fill="#475569" font-weight="500">维度</text>
  

  <rect x="90" y="412" width="390" height="132" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
